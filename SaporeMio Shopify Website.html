// Olive Branch SVG Component
function OliveBranch({ color, scale = 1 }) {
  return (
    <svg width={100 * scale} height={58 * scale} viewBox="0 0 100 58" style={{overflow:'visible'}}>
      <g transform="translate(12,50)">
        <path d="M 0,0 C 18,-7 42,-16 68,-28" stroke={color} strokeWidth={1/scale} fill="none" strokeLinecap="round"/>
        {/* Leaves */}
        {[
          {x:12,y:-4,r:-65}, {x:13,y:-3.5,r:38},
          {x:27,y:-9,r:-68}, {x:28,y:-8.5,r:35},
          {x:43,y:-16,r:-70}, {x:44,y:-15.5,r:33},
          {x:58,y:-23,r:-72}, {x:59,y:-22.5,r:31},
        ].map((l,i) => (
          <g key={i} transform={`translate(${l.x},${l.y}) rotate(${l.r})`}>
            <path d="M 0,0 C 2,2.4 12,2.8 18,0 C 12,-2.8 2,-2.4 0,0 Z" 
              stroke={color} strokeWidth={1/scale} fill="none" strokeLinecap="round"/>
            <line x1="0.5" y1="0" x2="17" y2="0" stroke={color} 
              strokeWidth={0.45/scale} strokeLinecap="round" opacity="0.7"/>
          </g>
        ))}
        {/* Olives */}
        <ellipse cx={20} cy={-7} rx={2.8} ry={1.8} transform="rotate(-22 20 -7)" 
          stroke={color} strokeWidth={0.85/scale} fill="none"/>
        <ellipse cx={50} cy={-20} rx={2.8} ry={1.8} transform="rotate(-25 50 -20)" 
          stroke={color} strokeWidth={0.85/scale} fill="none"/>
      </g>
    </svg>
  );
}

// CTA Button Component
function CTAButton({ children, style, colors, typeSystem, secondary }) {
  const baseStyle = {
    fontFamily: typeSystem.body,
    fontSize: 12,
    letterSpacing: '0.14em',
    textTransform: 'uppercase',
    border: 'none',
    padding: '16px 36px',
    cursor: 'pointer',
    transition: 'all 0.2s',
    fontWeight: 500,
  };
  
  if (style === 'solid') {
    return (
      <button style={{
        ...baseStyle,
        background: secondary ? 'transparent' : colors.text,
        color: secondary ? colors.text : colors.bg,
        border: secondary ? `1px solid ${colors.text}` : 'none',
      }}>
        {children}
      </button>
    );
  }
  
  // Outlined style
  return (
    <button style={{
      ...baseStyle,
      background: secondary ? colors.bg : colors.accent,
      color: secondary ? colors.text : colors.bg,
      border: `1px solid ${secondary ? colors.rule : colors.accent}`,
    }}>
      {children}
    </button>
  );
}

                    fontFamily: typeSystem.body,
                    fontSize: 16,
                    color: colors.text,
                  }}>
                    {item.value}
                  </div>
                </div>
              ))}
            </div>
          </div>
          
          {/* Right: Form */}
          <div style={{
            background: colors.faint,
            padding: 48,
          }}>
            <form style={{
              display: 'flex',
              flexDirection: 'column',
              gap: 24,
            }}>
              <div>
                <label style={{
                  fontFamily: typeSystem.body,
                  fontSize: 12,
                  letterSpacing: '0.08em',
                  textTransform: 'uppercase',
                  color: colors.text,
                  display: 'block',
                  marginBottom: 8,
                }}>
                  Name
                </label>
                <input 
                  type="text"
                  style={{
                    width: '100%',
                    padding: '14px 16px',
                    fontFamily: typeSystem.body,
                    fontSize: 14,
                    background: colors.bg,
                    border: `1px solid ${colors.rule}`,
                    color: colors.text,
                  }}
                />
              </div>
              
              <div>
                <label style={{
                  fontFamily: typeSystem.body,
                  fontSize: 12,
                  letterSpacing: '0.08em',
                  textTransform: 'uppercase',
                  color: colors.text,
                  display: 'block',
                  marginBottom: 8,
                }}>
                  Email
                </label>
                <input 
                  type="email"
                  style={{
                    width: '100%',
                    padding: '14px 16px',
                    fontFamily: typeSystem.body,
                    fontSize: 14,
                    background: colors.bg,
                    border: `1px solid ${colors.rule}`,
                    color: colors.text,
                  }}
                />
              </div>
              
              <div>
                <label style={{
                  fontFamily: typeSystem.body,
                  fontSize: 12,
                  letterSpacing: '0.08em',
                  textTransform: 'uppercase',
                  color: colors.text,
                  display: 'block',
                  marginBottom: 8,
                }}>
                  Message
                </label>
                <textarea 
                  rows="6"
                  style={{
                    width: '100%',
                    padding: '14px 16px',
                    fontFamily: typeSystem.body,
                    fontSize: 14,
                    background: colors.bg,
                    border: `1px solid ${colors.rule}`,
                    color: colors.text,
                    resize: 'vertical',
                  }}
                />
              </div>
              
              <div style={{ marginTop: 8 }}>
                <CTAButton style={ctaStyle} colors={colors} typeSystem={typeSystem}>
                  Send message
                </CTAButton>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════════════ */

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [currentPage, setCurrentPage] = useState('home');
  
  const colors = COLORS[tweaks.colorScheme];
  const typeSystem = TYPE_SYSTEMS[tweaks.typography];
  
  useEffect(() => {
    document.body.style.background = colors.bg;
    document.body.style.color = colors.text;
  }, [colors]);
  
  
  return (
    <>
      <Navigation 
        style={tweaks.navStyle} 
        colors={colors} 
        typeSystem={typeSystem}
        onNavigate={setCurrentPage}
        currentPage={currentPage}
      />
      

      
      {/* Render current page */}
      <div>
        {currentPage === 'menu' && (
          <MenuPage colors={colors} typeSystem={typeSystem} />
        )}
        
        {currentPage === 'home' && (
          <>
            <HeroSection
              colors={colors}
              typeSystem={typeSystem}
              ctaStyle={tweaks.ctaStyle}
            />
            <DualPath
              colors={colors}
              typeSystem={typeSystem}
              ctaStyle={tweaks.ctaStyle}
            />
            <Newsletter
              colors={colors}
              typeSystem={typeSystem}
            />
          </>
        )}
        
        {currentPage === 'products' && (
          <ProductListing 
            colors={colors}
            typeSystem={typeSystem}
            productCardStyle={tweaks.productCardStyle}
          />
        )}
        
        {currentPage === 'detail' && (
          <ProductDetail 
            colors={colors}
            typeSystem={typeSystem}
            ctaStyle={tweaks.ctaStyle}
          />
        )}
        
        {currentPage === 'cart' && (
          <Cart 
            colors={colors}
            typeSystem={typeSystem}
            ctaStyle={tweaks.ctaStyle}
          />
        )}
        
        {currentPage === 'about' && (
          <AboutPage colors={colors} typeSystem={typeSystem} />
        )}

        {currentPage === 'contact' && (
          <Contact 
            colors={colors}
            typeSystem={typeSystem}
            ctaStyle={tweaks.ctaStyle}
          />
        )}
        
        <Footer colors={colors} typeSystem={typeSystem} />
      </div>
      
      {/* Tweaks Panel */}
      <TweaksPanel tweaks={tweaks} setTweak={setTweak}>
        <TweakSection title="Navigation">
          <TweakRadio
            label="Nav Style"
            value={tweaks.navStyle}
            options={[
              { value: 'clean', label: 'Clean' },
              { value: 'minimal', label: 'Minimal' },
            ]}
            onChange={v => setTweak('navStyle', v)}
          />
        </TweakSection>
        
        <TweakSection title="Colors">
          <TweakRadio
            label="Color Scheme"
            value={tweaks.colorScheme}
            options={[
              { value: 'ivory', label: 'Ivory' },
              { value: 'black', label: 'Black' },
              { value: 'warm', label: 'Warm' },
            ]}
            onChange={v => setTweak('colorScheme', v)}
          />
        </TweakSection>
        
        <TweakSection title="Typography">
          <TweakRadio
            label="Type System"
            value={tweaks.typography}
            options={[
              { value: 'cormorant', label: 'Cormorant' },
              { value: 'dmSans', label: 'DM Sans' },
            ]}
            onChange={v => setTweak('typography', v)}
          />
        </TweakSection>
        
        
        <TweakSection title="Components">
          <TweakRadio
            label="Product Cards"
            value={tweaks.productCardStyle}
            options={[
              { value: 'minimal', label: 'Minimal' },
              { value: 'card', label: 'Bordered' },
            ]}
            onChange={v => setTweak('productCardStyle', v)}
          />
          <TweakRadio
            label="CTA Buttons"
            value={tweaks.ctaStyle}
            options={[
              { value: 'solid', label: 'Solid' },
              { value: 'outlined', label: 'Outlined' },
            ]}
            onChange={v => setTweak('ctaStyle', v)}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
